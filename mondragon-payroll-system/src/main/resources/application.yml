spring:
  application:
    name: mondragon-payroll-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payroll_db}
    username: ${SPRING_DATASOURCE_USERNAME:payroll}
    password: ${SPRING_DATASOURCE_PASSWORD:payroll123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Manila
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:MondragonFoodProductsPayrollSecretKey2026VeryLongSecureKey}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}

logging:
  level:
    com.mondragon.payroll: INFO
