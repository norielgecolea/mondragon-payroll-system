services:
  postgres:
    image: postgres:17
    container_name: payroll-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payroll123}
      POSTGRES_DB: ${POSTGRES_DB:-payroll_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payroll} -d ${POSTGRES_DB:-payroll_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./mondragon-payroll-system
      dockerfile: Dockerfile
    container_name: payroll-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-payroll_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payroll}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payroll123}
      JWT_SECRET: ${JWT_SECRET:-MondragonFoodProductsPayrollSecretKey2026VeryLongSecureKey}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/payroll-ui
      dockerfile: Dockerfile
    container_name: payroll-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: payroll-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend




  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./data/cloudflared:/etc/cloudflared
    depends_on:
      - nginx